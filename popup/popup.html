<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PRM Partner Sandbox</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app-shell" aria-labelledby="popup-title">
      <header class="topbar">
        <div>
          <p class="eyebrow">Salesforce Experience Cloud</p>
          <h1 id="popup-title">PRM Sandbox</h1>
        </div>
      </header>

      <section class="section">
        <div class="section-heading">
          <h2>View Mode</h2>
          <span class="quiet" id="active-persona-label">Loading...</span>
        </div>

        <div class="segmented-control" role="radiogroup" aria-label="View mode">
          <button class="segment is-active" id="single-view-button" type="button" role="radio" aria-checked="true">
            <span class="segment-title">Single View</span>
            <span class="segment-note">Current tab</span>
          </button>
          <button class="segment" id="split-view-button" type="button" role="radio" aria-checked="false">
            <span class="segment-title">Split-Screen</span>
            <span class="segment-note" id="split-view-note">Compare two</span>
          </button>
          <button class="segment" id="split-three-view-button" type="button" role="radio" aria-checked="false">
            <span class="segment-title">Compare Three</span>
            <span class="segment-note" id="split-three-view-note">Three views</span>
          </button>
          <button class="segment" id="split-four-view-button" type="button" role="radio" aria-checked="false">
            <span class="segment-title">Compare Four</span>
            <span class="segment-note" id="split-four-view-note">Four views</span>
          </button>
        </div>
      </section>

      <section class="section">
        <div class="section-heading">
          <h2>Personas</h2>
          <span class="quiet" id="persona-count">0 saved</span>
        </div>

        <div class="persona-list" id="persona-list" aria-live="polite"></div>

        <button class="primary-button" id="new-persona-button" type="button">
          <span aria-hidden="true">+</span>
          <span>New Persona</span>
        </button>
      </section>

      <section class="editor" id="persona-editor" hidden aria-labelledby="editor-title">
        <div class="section-heading">
          <h2 id="editor-title">New Persona</h2>
          <button class="icon-button" id="close-editor-button" type="button" aria-label="Close editor">x</button>
        </div>

        <form id="persona-form">
          <label class="field">
            <span>Name</span>
            <input id="persona-name" name="name" type="text" autocomplete="off" maxlength="48" required>
          </label>

          <div class="metadata-status" id="metadata-status">Detecting Salesforce picklist fields...</div>

          <div class="field-grid">
            <label class="field">
              <span>Partner Type</span>
              <select id="partner-type" name="partnerType"></select>
              <small id="partner-type-api">Field API: detecting...</small>
            </label>

            <label class="field">
              <span>Partner Tier</span>
              <select id="partner-tier" name="partnerTier"></select>
              <small id="partner-tier-api">Field API: detecting...</small>
            </label>
          </div>

          <label class="field">
            <span>Region</span>
            <select id="region" name="region"></select>
            <small id="region-api">Field API: detecting...</small>
          </label>

          <div class="form-actions">
            <button class="ghost-button" id="cancel-editor-button" type="button">Cancel</button>
            <button class="primary-button" type="submit">Save Persona</button>
          </div>
        </form>
      </section>

      <footer class="footer">
        <p id="status-message" role="status">Ready</p>
      </footer>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
